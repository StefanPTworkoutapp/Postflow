<svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0DA5A5"/>
      <stop offset="100%" stop-color="#088a8a"/>
    </linearGradient>
    <linearGradient id="satFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3560"/>
      <stop offset="100%" stop-color="#1A203A"/>
    </linearGradient>
    <linearGradient id="hubFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4E8C8"/>
      <stop offset="100%" stop-color="#aed494"/>
    </linearGradient>
    <filter id="sg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="420" rx="94" fill="url(#bg)"/>
  <circle cx="320" cy="110" r="140" fill="rgba(255,255,255,0.04)"/>

  <!--
    PF GLYPH — layering:
    F drawn FIRST in rgba(255,255,255,0.25) — ghosted behind
    P drawn ON TOP in solid white
    Where they overlap = P wins (white). Where F extends beyond P = ghost shows.

    F shape: left stem + top bar (full width) + mid bar (full width). No bowl, no bottom.
    P shape: left stem + top bar + mid bar + bowl right side.

    F top bar extends to x=260 (further right than P's x=222)
    F mid bar extends to x=246
    F left stem shared — but P stem is on top so no issue.

    The ghost F arm tips (x=222→260 top, x=222→246 mid) peek out to the right
    of the P bowl — that's where you see the F.
  -->

  <!-- SPOKES — under everything -->
  <line x1="222" y1="216" x2="352" y2="88"  stroke="rgba(212,232,200,0.6)"  stroke-width="3" stroke-linecap="round" filter="url(#sg)"/>
  <line x1="222" y1="216" x2="364" y2="230" stroke="rgba(212,232,200,0.65)" stroke-width="3" stroke-linecap="round" filter="url(#sg)"/>
  <line x1="222" y1="216" x2="336" y2="350" stroke="rgba(212,232,200,0.55)" stroke-width="3" stroke-linecap="round" filter="url(#sg)"/>

  <!-- Cross-connects -->
  <line x1="352" y1="88"  x2="364" y2="230" stroke="rgba(212,232,200,0.2)"  stroke-width="2"   stroke-dasharray="6 10" stroke-linecap="round"/>
  <line x1="364" y1="230" x2="336" y2="350" stroke="rgba(212,232,200,0.2)"  stroke-width="2"   stroke-dasharray="6 10" stroke-linecap="round"/>
  <line x1="352" y1="88"  x2="336" y2="350" stroke="rgba(212,232,200,0.1)"  stroke-width="1.5" stroke-dasharray="4 14" stroke-linecap="round"/>

  <!-- ── F — ghosted, drawn first ── -->
  <!-- F left stem (same as P, will be covered) -->
  <rect x="62"  y="90"  width="38"  height="210" rx="7" fill="rgba(255,255,255,0.28)"/>
  <!-- F top bar — extends further right than P (to x=268) -->
  <rect x="62"  y="90"  width="206" height="38"  rx="7" fill="rgba(255,255,255,0.28)"/>
  <!-- F mid bar — extends further right than P (to x=252) -->
  <rect x="62"  y="178" width="190" height="38"  rx="7" fill="rgba(255,255,255,0.28)"/>
  <!-- F has no bowl and no bottom bar — open right side is what reads as F vs P -->

  <!-- ── P — solid white, on top ── -->
  <rect x="62"  y="90"  width="38"  height="210" rx="7" fill="white"/>
  <rect x="62"  y="90"  width="160" height="38"  rx="7" fill="white"/>
  <rect x="62"  y="178" width="160" height="38"  rx="7" fill="white"/>
  <rect x="184" y="90"  width="38"  height="126" rx="7" fill="white"/>

  <!-- HUB NODE at P bowl bottom-right corner (222, 216) -->
  <circle cx="222" cy="216" r="28" fill="rgba(212,232,200,0.18)" filter="url(#hg)"/>
  <circle cx="222" cy="216" r="19" fill="url(#hubFill)"/>
  <circle cx="222" cy="216" r="19" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="222" cy="216" r="6"  fill="rgba(5,75,75,0.55)"/>

  <!-- ── SATELLITE NODES ── all icons use 3px stroke-width, 6px rect widths, same weight ── -->

  <!-- TikTok — top right, centre (352, 88) — unicode eighth note ♪ -->
  <circle cx="352" cy="88" r="30" fill="url(#satFill)" stroke="rgba(212,232,200,0.4)" stroke-width="2"/>
  <text x="352" y="88"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="serif"
        font-size="32"
        fill="rgba(255,255,255,0.92)">♪</text>

  <!-- LinkedIn — right, centre (364, 230) — real text "in" -->
  <circle cx="364" cy="230" r="30" fill="url(#satFill)" stroke="rgba(212,232,200,0.4)" stroke-width="2"/>
  <text x="364" y="231"
        text-anchor="middle"
        dominant-baseline="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="rgba(255,255,255,0.92)">in</text>

  <!-- Instagram — bottom right, centre (336, 350) -->
  <!-- Camera square + inner circle + corner dot. All strokes 3px. -->
  <circle cx="336" cy="350" r="30" fill="url(#satFill)" stroke="rgba(212,232,200,0.4)" stroke-width="2"/>
  <g transform="translate(336,350)">
    <rect x="-16" y="-16" width="32" height="32" rx="8" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="3"/>
    <circle cx="0" cy="0" r="8.5" fill="none" stroke="rgba(255,255,255,0.92)" stroke-width="3"/>
    <circle cx="10" cy="-10" r="2.5" fill="rgba(255,255,255,0.92)"/>
  </g>

</svg>
